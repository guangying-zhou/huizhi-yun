# Nginx HTTP-only config for Console prod/test PM2 instances.
# Domains:
#   hzy.wiztek.cn      -> console-prod on 127.0.0.1:3030
#   hzy-test.wiztek.cn -> console-test on 127.0.0.1:3031
#
# If console-prod is deployed to Cloudflare, do not route hzy.wiztek.cn
# through this server config; keep only the hzy-test.wiztek.cn server block.
#
# Install example:
#   sudo mkdir -p /var/www/certbot
#   sudo cp deploy/nginx/console-wiztek.conf /etc/nginx/conf.d/console-wiztek.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Certificate bootstrap:
#   sudo certbot certonly --webroot -w /var/www/certbot -d hzy.wiztek.cn
#   sudo certbot certonly --webroot -w /var/www/certbot -d hzy-test.wiztek.cn

map $http_upgrade $hzy_console_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name hzy.wiztek.cn;

    client_max_body_size 100m;

    access_log /var/log/nginx/console-prod.access.log;
    error_log /var/log/nginx/console-prod.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 80;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $hzy_console_connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name hzy-test.wiztek.cn;

    client_max_body_size 100m;

    access_log /var/log/nginx/console-test.access.log;
    error_log /var/log/nginx/console-test.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 80;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $hzy_console_connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
