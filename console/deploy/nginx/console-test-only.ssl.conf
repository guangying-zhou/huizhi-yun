# Nginx HTTPS config for shared console-test when console-prod runs on Cloudflare.
# Use this template instead of console-wiztek.ssl.conf when hzy.wiztek.cn is
# routed to Cloudflare Worker. Do not install both templates to Nginx at the same time.
#
# Enable after certificate exists:
#   sudo cp deploy/nginx/console-test-only.ssl.conf /etc/nginx/conf.d/console-wiztek.conf
#   sudo nginx -t
#   sudo systemctl reload nginx

map $http_upgrade $hzy_console_test_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name hzy-test.wiztek.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hzy-test.wiztek.cn;

    ssl_certificate /etc/letsencrypt/live/hzy-test.wiztek.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hzy-test.wiztek.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:HZYConsoleTestOnlySSL:10m;
    ssl_session_tickets off;

    client_max_body_size 100m;

    access_log /var/log/nginx/console-test.access.log;
    error_log /var/log/nginx/console-test.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $hzy_console_test_connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
