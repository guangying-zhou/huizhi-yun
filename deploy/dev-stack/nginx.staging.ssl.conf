# Nginx HTTPS entrypoint for the HZY dev-stack app server.
# Domain: hzy.wiztek.cn
# Upstream: local Caddy dev-stack router on 127.0.0.1:3180
#
# Enable after certificate exists:
#   sudo cp deploy/dev-stack/nginx.staging.ssl.conf /etc/nginx/conf.d/hzy-runtime.conf
#   sudo nginx -t
#   sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

proxy_cache_path /var/cache/nginx/hzy-worker-assets levels=1:2 keys_zone=hzy_worker_assets:20m max_size=1024m inactive=30d use_temp_path=off;
proxy_cache_path /var/cache/nginx/hzy-worker-pages levels=1:2 keys_zone=hzy_worker_pages:10m max_size=128m inactive=10m use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name hzy.wiztek.cn;

    client_header_buffer_size 16k;
    large_client_header_buffers 8 64k;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hzy.wiztek.cn;

    ssl_certificate /etc/letsencrypt/live/hzy.wiztek.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hzy.wiztek.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:HZYRuntimeSSL:10m;
    ssl_session_tickets off;

    client_max_body_size 200m;
    client_header_buffer_size 16k;
    large_client_header_buffers 8 64k;

    access_log /var/log/nginx/hzy-runtime.access.log;
    error_log /var/log/nginx/hzy-runtime.error.log warn;

    location ~ ^/(finance|altoc)/_nuxt/ {
        proxy_pass http://127.0.0.1:3180;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
        proxy_buffering on;

        proxy_cache hzy_worker_assets;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_lock on;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 301 302 10m;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Set-Cookie;
        add_header X-HZY-Proxy-Cache $upstream_cache_status always;
    }

    location ~ ^/(finance|altoc)/(favicon\.ico|favicon\.png|logo\.(png|svg)|manifest\.webmanifest)$ {
        proxy_pass http://127.0.0.1:3180;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
        proxy_buffering on;

        proxy_cache hzy_worker_assets;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_lock on;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 301 302 10m;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Set-Cookie;
        add_header X-HZY-Proxy-Cache $upstream_cache_status always;
    }

    location = /finance/ {
        proxy_pass http://127.0.0.1:3180;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
        proxy_buffering on;

        proxy_cache hzy_worker_pages;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_lock on;
        proxy_cache_valid 200 60s;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Set-Cookie;
        add_header X-HZY-Proxy-Cache $upstream_cache_status always;
    }

    location = /altoc/ {
        proxy_pass http://127.0.0.1:3180;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
        proxy_buffering on;

        proxy_cache hzy_worker_pages;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_lock on;
        proxy_cache_valid 200 60s;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Set-Cookie;
        add_header X-HZY-Proxy-Cache $upstream_cache_status always;
    }

    location / {
        proxy_pass http://127.0.0.1:3180;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
        proxy_buffering off;
    }
}
