# 汇智云企业端统一域名部署 Nginx 模板
#
# 使用方式：
# 1. 将 server_name、证书路径和上游端口替换为实际部署值。
# 2. 应用启动环境必须与这里的 path 一致：
#      Console: HZY_DEPLOYMENT_PUBLIC_URL=https://hzy.wiztek.cn NUXT_APP_BASE_URL=/admin/ HZY_APP_BASE_PATH=/admin/
#      Aims:    HZY_DEPLOYMENT_PUBLIC_URL=https://hzy.wiztek.cn NUXT_APP_BASE_URL=/aims/  HZY_APP_BASE_PATH=/aims/
#      Codocs:  HZY_DEPLOYMENT_PUBLIC_URL=https://hzy.wiztek.cn NUXT_APP_BASE_URL=/codocs/ HZY_APP_BASE_PATH=/codocs/
# 3. 注意 proxy_pass 不带尾部 "/"，用于保留 /admin/、/aims/、/codocs/ 前缀。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream hzy_console {
    server 127.0.0.1:3000;
}

upstream hzy_aims {
    server 127.0.0.1:3002;
}

upstream hzy_codocs {
    server 127.0.0.1:3001;
}

upstream hzy_collab {
    # Collab Runtime 默认由 Console 进程内嵌启动并监听 3021；如切换 standalone，保持同一 upstream。
    server 127.0.0.1:3021;
}

server {
    listen 80;
    server_name hzy.wiztek.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hzy.wiztek.cn;

    # ssl_certificate     /etc/letsencrypt/live/hzy.wiztek.cn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hzy.wiztek.cn/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;

    access_log /var/log/nginx/hzy.access.log;
    error_log  /var/log/nginx/hzy.error.log;

    location = /admin {
        return 308 /admin/;
    }

    location = /aims {
        return 308 /aims/;
    }

    location = /codocs {
        return 308 /codocs/;
    }

    # Codocs/Collab Runtime 协作 WebSocket。
    # NUXT_PUBLIC_COLLABORATION_URL 可使用 wss://hzy.wiztek.cn/codocs/ws。
    location /codocs/ws {
        proxy_pass http://hzy_collab;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /admin/ {
        proxy_pass http://hzy_console;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /aims/ {
        proxy_pass http://hzy_aims;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /aims;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /codocs/ {
        proxy_pass http://hzy_codocs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /codocs;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 根应用必须放在最后；若当前没有根应用，可返回 404 或跳转到 /admin/。
    location / {
        return 302 /admin/;
    }
}
