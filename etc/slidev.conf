server {
    server_name slidev.wiztek.cn;

    # Slidev dev server 反向代理（含 WebSocket 支持，Vite HMR 需要）
    location / {
        proxy_pass http://127.0.0.1:3045;
        proxy_http_version 1.1;

        # WebSocket 支持（Vite HMR）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接超时（HMR WebSocket）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/slidev.wiztek.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/slidev.wiztek.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = slidev.wiztek.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name slidev.wiztek.cn;
    return 404; # managed by Certbot


}