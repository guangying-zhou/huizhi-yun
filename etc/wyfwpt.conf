# HTTPS server
#
server {
    listen       80;
    server_name  wyfwpt.com www.wyfwpt.com;
    return 301 https://www.wyfwpt.com$request_uri;      
}

server {
        listen 443 default_server ssl;
        server_name wyfwpt.com;

        client_max_body_size 100M;

        #charset koi8-r;

        #access_log  logs/host.access.log  main;
        sendfile on;

        #ssl_certificate "/application/nginx-1.24.0/cert/wyfwpt_com.pem";
        #ssl_certificate_key "/application/nginx-1.24.0/cert/wyfwpt_com.key";
		ssl_certificate "/etc/nginx/ssl/STAR_wyfwpt_com_integrated.crt";
	    ssl_certificate_key "/etc/nginx/ssl/STAR_wyfwpt_com.key";
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 10m;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_ciphers AESGCM:ALL:!DH:!EXPORT:!RC4:+HIGH:!MEDIUM:!LOW:!aNULL:!eNULL;
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_prefer_server_ciphers on;

        # 启动内容压缩，有效降低网络流量
        gzip on;
        # 过短的内容压缩效果不佳，压缩过程还会浪费系统资源
        gzip_min_length 1000;
        # 可选值1~9,压缩级别越高压缩率越高，但对系统性能要求越高
        gzip_comp_level 4;
        # 压缩的内容类别
        gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        ssi on;
        ssi_silent_errors on;
        ssi_types text/shtml;

        proxy_intercept_errors on;


        #proxy_set_header Host $http_host;
        proxy_pass_request_headers on;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        set $domain default;
        
        add_header X-Content-Type-Options nosniff;
        add_header 'Referrer-Policy' 'origin';
        add_header X-Download-Options "noopen" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload";
        add_header X-Permitted-Cross-Domain-Policies  "master-only";
        add_header X-Frame-Options SAMEORIGIN;
        add_header Content-Security-Policy "default-src 'self' data: *.xxx.com  'unsafe-inline' 'unsafe-eval' mediastream: ";
        add_header X-Content-Type-Options: nosniff;
        add_header X-XSS-Protection "1; mode=block";

        



        #停用十二师-赵衍峰-20240718操作
        #location / {
                #root /wiztek/application/shiershi/website/;
                #index index.html index.htm index.shtml;
        #}
	location /sO1OzQW3lx.txt {
                root /wiztek/application/dyq/;
                index index.html index.htm index.shtml;
        }
        location /nR5fXOBiBA.txt {
                root /wiztek/application/hk/;
                index index.html index.htm index.shtml;
        }

	location /3AFbj96LJP.txt {
                root /wiztek/application/lj/;
                index index.html index.htm index.shtml;
        }
        location /pmisWebServer {
                proxy_pass http://222.82.223.196:443/pmisWebServer;

        }

        location /remall {
                proxy_pass http://222.82.223.196:443/remall;
        }

        #东营区票据转发
	location / {  
        # 转发请求到后端服务器，注意这里不直接在 URL 中包含端口号
        proxy_pass https://dyq-wxzj.wyfwpt.com:8811/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        }
	 #河口区票据转发
	location /hk{ 
	#加上这句话
	add_header Content-Security-Policy "default-src 'self' data: blob: *.xxx.com 'unsafe-inline' 'unsafe-eval' mediastream;";
        # 转发请求到后端服务器，注意这里不直接在 URL 中包含端口号
        proxy_pass https://dyhk-wxzj.wyfwpt.com:8811/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        } 
	#利津县票据转发nginx: [emerg] host not found in upstream "dylj-wxzj.wyfwpt.com"
	location /lj{ 
	#加上这句话
	add_header Content-Security-Policy "default-src 'self' data: blob: *.xxx.com 'unsafe-inline' 'unsafe-eval' mediastream;";
        # 转发请求到后端服务器，注意这里不直接在 URL 中包含端口号
        proxy_pass https://dylj-wxzj.wyfwpt.com:8899/;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
         } 

        error_page 404 /404.html;
        location = /404.html {
                root html;
        }

        location = /404.png {
                root html/img;
        }

        location = /logo_blue.png {
                root html/img;
        }

        location = /xcx.jpg {
                root html/img;
        }
        # redirect server error pages to the static page /50x.html
        #
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
                root html;
        }
}
