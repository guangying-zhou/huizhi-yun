# ============ Account =============
server {
    server_name account.wiztek.cn;

    # 如需 HTTPS 请取消注释以下两行并放置证书
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/account.crt;
    # ssl_certificate_key /etc/nginx/ssl/account.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/account.wiztek.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/account.wiztek.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# ============ Codocs ==============
server {
    server_name codocs.wiztek.cn;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 协作端点
    location /ws {
        proxy_pass http://127.0.0.1:1234;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/codocs.wiztek.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/codocs.wiztek.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = account.wiztek.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name account.wiztek.cn;
    return 404; # managed by Certbot


}
server {
    if ($host = codocs.wiztek.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name codocs.wiztek.cn;
    return 404; # managed by Certbot


}

# ============ AIMS =============
# 放置到 /etc/nginx/conf.d/aims.wiztek.cn.conf
# 部署后执行：sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name aims.wiztek.cn;

    # 允许上传较大的审批附件（如需要可调小）
    client_max_body_size 50m;

    access_log /var/log/nginx/aims.access.log;
    error_log  /var/log/nginx/aims.error.log;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}


