# ============ Workflow =============
# 放置到 /etc/nginx/conf.d/workflow.wiztek.cn.conf
# 部署后执行：sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name workflow.wiztek.cn;

    # 允许上传较大的审批附件（如需要可调小）
    client_max_body_size 50m;

    access_log /var/log/nginx/workflow.access.log;
    error_log  /var/log/nginx/workflow.error.log;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
