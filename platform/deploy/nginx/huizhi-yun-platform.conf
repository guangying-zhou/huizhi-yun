# Nginx HTTP-only site config for standalone Platform deployment.
# Domain: huizhi.yun, www.huizhi.yun
# Upstream: Nuxt Platform on 127.0.0.1:3010
#
# Install example:
#   sudo cp deploy/nginx/huizhi-yun-platform.conf /etc/nginx/sites-available/huizhi-yun-platform.conf
#   sudo ln -s /etc/nginx/sites-available/huizhi-yun-platform.conf /etc/nginx/sites-enabled/huizhi-yun-platform.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Certificate bootstrap:
#   sudo certbot certonly --webroot -w /var/www/certbot -d huizhi.yun -d www.huizhi.yun

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name huizhi.yun www.huizhi.yun;

    client_max_body_size 100m;

    access_log /var/log/nginx/huizhi-yun-platform.access.log;
    error_log /var/log/nginx/huizhi-yun-platform.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 80;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
