# Nginx HTTP-only config for Platform prod/dev PM2 instances.
# Domains:
#   platform.wiztek.cn     -> platform-prod on 127.0.0.1:3010
#   platform-dev.wiztek.cn -> platform-dev on 127.0.0.1:3011
#
# Install example:
#   sudo mkdir -p /var/www/certbot
#   sudo cp deploy/nginx/platform-wiztek.conf /etc/nginx/conf.d/platform-wiztek.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Certificate bootstrap:
#   sudo certbot certonly --webroot -w /var/www/certbot -d platform.wiztek.cn
#   sudo certbot certonly --webroot -w /var/www/certbot -d platform-dev.wiztek.cn

map $http_upgrade $hzy_platform_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name platform.wiztek.cn;

    client_max_body_size 100m;

    access_log /var/log/nginx/platform-prod.access.log;
    error_log /var/log/nginx/platform-prod.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 80;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $hzy_platform_connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name platform-dev.wiztek.cn;

    client_max_body_size 100m;

    access_log /var/log/nginx/platform-dev.access.log;
    error_log /var/log/nginx/platform-dev.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 80;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $hzy_platform_connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
