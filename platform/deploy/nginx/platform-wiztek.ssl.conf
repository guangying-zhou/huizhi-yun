# Nginx HTTPS config for Platform prod/dev PM2 instances.
# Enable after certificates exist:
#   sudo cp deploy/nginx/platform-wiztek.ssl.conf /etc/nginx/conf.d/platform-wiztek.conf
#   sudo nginx -t
#   sudo systemctl reload nginx

map $http_upgrade $hzy_platform_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name platform.wiztek.cn platform-dev.wiztek.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name platform.wiztek.cn;

    ssl_certificate /etc/letsencrypt/live/platform.wiztek.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platform.wiztek.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:HZYPlatformProdSSL:10m;
    ssl_session_tickets off;

    client_max_body_size 100m;

    access_log /var/log/nginx/platform-prod.access.log;
    error_log /var/log/nginx/platform-prod.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $hzy_platform_connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name platform-dev.wiztek.cn;

    ssl_certificate /etc/letsencrypt/live/platform-dev.wiztek.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platform-dev.wiztek.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:HZYPlatformDevSSL:10m;
    ssl_session_tickets off;

    client_max_body_size 100m;

    access_log /var/log/nginx/platform-dev.access.log;
    error_log /var/log/nginx/platform-dev.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $hzy_platform_connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
