# Nginx HTTPS site config for standalone Platform deployment.
# Domain: huizhi.yun, www.huizhi.yun
# Upstream: Nuxt Platform on 127.0.0.1:3010
#
# Enable after certificate exists:
#   sudo cp deploy/nginx/huizhi-yun-platform.ssl.conf /etc/nginx/conf.d/huizhi-yun-platform.conf
#   sudo nginx -t
#   sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name huizhi.yun www.huizhi.yun;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name huizhi.yun www.huizhi.yun;

    ssl_certificate /etc/letsencrypt/live/huizhi.yun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/huizhi.yun/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:HZYPlatformSSL:10m;
    ssl_session_tickets off;

    client_max_body_size 100m;

    access_log /var/log/nginx/huizhi-yun-platform.access.log;
    error_log /var/log/nginx/huizhi-yun-platform.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
